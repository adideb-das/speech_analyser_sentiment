<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>speech / analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #080b0f;
    --surface:   #0e1318;
    --border:    #1c2530;
    --accent:    #00e5a0;
    --accent2:   #0099ff;
    --danger:    #ff3c5a;
    --muted:     #3a4a5a;
    --text:      #d0dde8;
    --text-dim:  #536070;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .logo span { color: var(--accent); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .status-pill .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-pill.connected .dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  .status-pill.error .dot { background: var(--danger); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  .header-stats {
    display: flex;
    gap: 24px;
  }
  .stat {
    text-align: right;
  }
  .stat-val {
    font-family: var(--sans);
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .stat-label {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── MAIN GRID ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 420px;
    grid-template-rows: 1fr;
    gap: 0;
    overflow: hidden;
  }

  /* ── LEFT: WAVEFORM COLUMN ── */
  .waveform-col {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .col-label {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 16px 24px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .col-label::before {
    content: '';
    display: block;
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--accent);
  }

  .waveform-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 0 0 0;
  }

  #waveCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* centre line */
  .centre-line {
    position: absolute;
    top: 50%;
    left: 24px; right: 24px;
    height: 1px;
    background: var(--border);
    pointer-events: none;
  }

  /* playhead */
  .playhead {
    position: absolute;
    top: 0; bottom: 0;
    width: 1px;
    background: var(--accent);
    opacity: 0.5;
    right: 24px;
    pointer-events: none;
  }

  /* ── MIC PERMISSION OVERLAY ── */
  .mic-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: var(--bg);
    z-index: 10;
  }
  .mic-overlay.hidden { display: none; }
  .mic-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 24px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .mic-btn:hover { background: var(--accent); color: var(--bg); }
  .mic-hint {
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  /* ── VOLUME BAR ── */
  .vol-bar-wrap {
    padding: 0 24px 20px;
    flex-shrink: 0;
  }
  .vol-track {
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .vol-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.06s linear;
  }

  /* ── RIGHT: TRANSCRIPT COLUMN ── */
  .transcript-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .transcript-feed {
    flex: 1;
    overflow-y: auto;
    padding: 0;
    scroll-behavior: smooth;
  }
  .transcript-feed::-webkit-scrollbar { width: 3px; }
  .transcript-feed::-webkit-scrollbar-track { background: transparent; }
  .transcript-feed::-webkit-scrollbar-thumb { background: var(--border); }

  .chunk {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.3s ease;
    position: relative;
  }
  .chunk::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: transparent;
    transition: background 0.3s;
  }
  .chunk.fresh::before { background: var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .chunk-meta {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chunk-lang {
    color: var(--accent2);
    opacity: 0.7;
  }

  .chunk-text {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--text);
    font-weight: 400;
  }

  .chunk.silent .chunk-text {
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.75rem;
  }

  .emotion-row {
    margin-top: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .emo-tag {
    font-size: 0.58rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .emo-tag.dominant {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.07);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 8px;
    color: var(--text-dim);
  }
  .empty-state .big { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; }
  .empty-state .small { font-size: 0.6rem; }

  /* ── BOTTOM STATUS BAR ── */
  footer {
    padding: 8px 28px;
    border-top: 1px solid var(--border);
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #wsStatus { transition: color 0.3s; }
  .footer-right { display: flex; gap: 20px; }
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <div class="logo">speech<span>/</span>analyzer</div>

  <div class="status-pill" id="statusPill">
    <div class="dot"></div>
    <span id="statusText">connecting</span>
  </div>

  <div class="header-stats">
    <div class="stat">
      <div class="stat-val" id="statChunks">0</div>
      <div class="stat-label">chunks</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="statWords">0</div>
      <div class="stat-label">words</div>
    </div>
  </div>
</header>

<!-- ── MAIN ── -->
<main>

  <!-- WAVEFORM -->
  <div class="waveform-col">
    <div class="col-label">live waveform</div>
    <div class="waveform-wrap">
      <div class="centre-line"></div>
      <div class="playhead"></div>
      <canvas id="waveCanvas"></canvas>

      <!-- Mic permission overlay -->
      <div class="mic-overlay" id="micOverlay">
        <div class="mic-hint">microphone access required for waveform</div>
        <button class="mic-btn" id="micBtn">enable microphone</button>
      </div>
    </div>
    <div class="vol-bar-wrap">
      <div class="vol-track"><div class="vol-fill" id="volFill"></div></div>
    </div>
  </div>

  <!-- TRANSCRIPT -->
  <div class="transcript-col">
    <div class="col-label">live transcript</div>
    <div class="transcript-feed" id="feed">
      <div class="empty-state" id="emptyState">
        <div class="big">waiting for speech</div>
        <div class="small">connect to ws://localhost:8000/ws</div>
      </div>
    </div>
  </div>

</main>

<!-- ── FOOTER ── -->
<footer>
  <span id="wsStatus">ws://localhost:8000/ws</span>
  <div class="footer-right">
    <span id="footerTime">--:--:--</span>
  </div>
</footer>

<script>
// ══════════════════════════════════════════════════════
// WAVEFORM  (Web Audio API — reads directly from mic)
// ══════════════════════════════════════════════════════

const canvas   = document.getElementById('waveCanvas');
const ctx      = canvas.getContext('2d');
const overlay  = document.getElementById('micOverlay');
const micBtn   = document.getElementById('micBtn');
const volFill  = document.getElementById('volFill');

let analyser, dataArray, bufferLength, animFrame;
let waveHistory = [];          // stores past columns of amplitude data
const SCROLL_SPEED = 2;        // pixels per frame the history scrolls left

function resizeCanvas() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

async function startMic() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source   = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.8;
    source.connect(analyser);
    bufferLength = analyser.frequencyBinCount;
    dataArray    = new Uint8Array(bufferLength);
    overlay.classList.add('hidden');
    drawWaveform();
  } catch(e) {
    micBtn.textContent = 'permission denied';
    micBtn.style.borderColor = 'var(--danger)';
    micBtn.style.color = 'var(--danger)';
  }
}

micBtn.addEventListener('click', startMic);

// try auto-start (works if already granted)
navigator.mediaDevices?.getUserMedia({ audio: true })
  .then(stream => {
    // rebuild through proper path
    stream.getTracks().forEach(t => t.stop());
    startMic();
  }).catch(() => {});


function drawWaveform() {
  animFrame = requestAnimationFrame(drawWaveform);
  analyser.getByteTimeDomainData(dataArray);

  const W = canvas.width;
  const H = canvas.height;

  // compute RMS for volume bar
  let sum = 0;
  for (let i = 0; i < bufferLength; i++) {
    const v = (dataArray[i] - 128) / 128;
    sum += v * v;
  }
  const rms = Math.sqrt(sum / bufferLength);
  volFill.style.width = Math.min(rms * 300, 100) + '%';

  // Sample ~W amplitude values from current frame
  const column = [];
  for (let x = 0; x < W; x++) {
    const idx = Math.floor(x / W * bufferLength);
    column.push((dataArray[idx] - 128) / 128);  // -1..1
  }

  // We'll store just the "current" frame and scroll it
  // Actually: draw scrolling approach — each frame append one column to history
  // but that's memory intensive. Instead use canvas scroll trick.

  // === SCROLLING WAVEFORM ===
  // 1. Shift existing content left by SCROLL_SPEED px
  const imgData = ctx.getImageData(SCROLL_SPEED, 0, W - SCROLL_SPEED, H);
  ctx.putImageData(imgData, 0, 0);

  // 2. Clear right strip
  ctx.fillStyle = 'rgba(8, 11, 15, 1)';
  ctx.fillRect(W - SCROLL_SPEED, 0, SCROLL_SPEED, H);

  // 3. Draw the new amplitude columns on the right strip
  const mid = H / 2;
  const xStart = W - SCROLL_SPEED;

  // For each new pixel column we need to sample from current frame
  for (let dx = 0; dx < SCROLL_SPEED; dx++) {
    // sample the middle of the current buffer for a "current" reading
    const sampleIdx = Math.floor((dx / SCROLL_SPEED + 0.5) * (bufferLength / SCROLL_SPEED / 2));
    // Use a spread of sample points averaged
    let amp = 0;
    const spread = Math.floor(bufferLength / 20);
    for (let s = 0; s < spread; s++) {
      const i = (sampleIdx * spread + s) % bufferLength;
      amp += Math.abs((dataArray[i] - 128) / 128);
    }
    amp = amp / spread;

    const barH = amp * mid * 1.8;

    // gradient fill
    const grad = ctx.createLinearGradient(0, mid - barH, 0, mid + barH);
    grad.addColorStop(0,   'rgba(0, 229, 160, 0.85)');
    grad.addColorStop(0.5, 'rgba(0, 153, 255, 0.9)');
    grad.addColorStop(1,   'rgba(0, 229, 160, 0.85)');

    ctx.fillStyle = grad;
    ctx.fillRect(xStart + dx, mid - barH, 1, barH * 2);

    // draw a faint reflected glow below
    const glowGrad = ctx.createLinearGradient(0, mid, 0, mid + barH * 2.5);
    glowGrad.addColorStop(0,   'rgba(0, 153, 255, 0.2)');
    glowGrad.addColorStop(1,   'rgba(0, 153, 255, 0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(xStart + dx, mid + barH, 1, barH * 1.5);
  }
}

// Draw idle pattern when no mic yet
function drawIdle() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.strokeStyle = 'rgba(28, 37, 48, 0.8)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, H/2);
  ctx.lineTo(W, H/2);
  ctx.stroke();
}
drawIdle();


// ══════════════════════════════════════════════════════
// WEBSOCKET  — receives transcript results
// ══════════════════════════════════════════════════════

const feed       = document.getElementById('feed');
const emptyState = document.getElementById('emptyState');
const statusPill = document.getElementById('statusPill');
const statusText = document.getElementById('statusText');
const wsStatusEl = document.getElementById('wsStatus');
const statChunks = document.getElementById('statChunks');
const statWords  = document.getElementById('statWords');

let chunkCount = 0, wordCount = 0;

const WS_URL = `ws://${location.host}/ws`;

function connect() {
  const ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    statusPill.className = 'status-pill connected';
    statusText.textContent = 'live';
    wsStatusEl.style.color = 'var(--accent)';
    wsStatusEl.textContent = WS_URL;
    // send periodic pings
    setInterval(() => ws.readyState === 1 && ws.send('ping'), 20000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    appendChunk(data);
  };

  ws.onclose = () => {
    statusPill.className = 'status-pill';
    statusText.textContent = 'disconnected';
    wsStatusEl.style.color = 'var(--text-dim)';
    setTimeout(connect, 3000);  // auto-reconnect
  };

  ws.onerror = () => {
    statusPill.className = 'status-pill error';
    statusText.textContent = 'error';
  };
}

// Attempt WS connection — will retry silently
connect();

function appendChunk(data) {
  // remove empty state
  if (emptyState) emptyState.remove();

  const isSilent = data.is_silent;
  const text     = data.transcript || '';
  const ts       = data.timestamp  || '';
  const lang     = data.language   || '';
  const emotions = data.text_emotions || [];

  // stats
  chunkCount++;
  if (!isSilent && text) wordCount += text.trim().split(/\s+/).filter(Boolean).length;
  statChunks.textContent = chunkCount;
  statWords.textContent  = wordCount;

  const div = document.createElement('div');
  div.className = 'chunk fresh' + (isSilent ? ' silent' : '');

  // meta line
  const meta = document.createElement('div');
  meta.className = 'chunk-meta';
  meta.innerHTML = `<span>${ts}</span>${lang ? `<span class="chunk-lang">${lang}</span>` : ''}`;
  div.appendChild(meta);

  // text
  const textEl = document.createElement('div');
  textEl.className = 'chunk-text';
  textEl.textContent = isSilent ? '── silence ──' : (text || '…');
  div.appendChild(textEl);

  // emotion tags
  if (emotions.length > 0 && !isSilent) {
    const row = document.createElement('div');
    row.className = 'emotion-row';
    emotions.slice(0, 3).forEach((em, i) => {
      const tag = document.createElement('span');
      tag.className = 'emo-tag' + (i === 0 ? ' dominant' : '');
      tag.textContent = `${em.label} ${Math.round(em.score * 100)}%`;
      row.appendChild(tag);
    });
    div.appendChild(row);
  }

  feed.appendChild(div);
  feed.scrollTop = feed.scrollHeight;

  // remove "fresh" border after a moment
  setTimeout(() => div.classList.remove('fresh'), 2000);
}

// ── Clock ──
function tick() {
  document.getElementById('footerTime').textContent =
    new Date().toLocaleTimeString('en-GB');
}
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
