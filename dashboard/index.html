<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech Analyzer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0b0d;
    --surface:  #111318;
    --border:   #1e2128;
    --muted:    #3a3f4a;
    --dim:      #6b7280;
    --text:     #e2e5ec;
    --accent:   #00e5a0;
    --joy:      #f4c430;
    --anger:    #ff4f4f;
    --sadness:  #5b8fff;
    --fear:     #bf5fff;
    --surprise: #ff914d;
    --disgust:  #4fdb7a;
    --neutral:  #8892a4;
    --r: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; overflow: hidden; }

  /* Scan-line overlay */
  body::after {
    content: '';
    position: fixed; inset: 0; pointer-events: none; z-index: 999;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
  }

  /* Layout */
  .shell {
    display: grid;
    grid-template-rows: 52px 1fr;
    grid-template-columns: 320px 1fr 280px;
    grid-template-areas:
      "header header header"
      "left   center right";
    height: 100vh;
    gap: 1px;
    background: var(--border);
  }

  /* Header */
  header {
    grid-area: header;
    background: var(--surface);
    display: flex; align-items: center; gap: 20px;
    padding: 0 24px;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.5px; color: var(--accent); }
  .logo span { color: var(--dim); font-weight: 400; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 999px; padding: 4px 12px; font-size: 11px; color: var(--dim);
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .4s; }
  .dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .pill.live { border-color: var(--accent); color: var(--text); }
  .stats { margin-left: auto; display: flex; gap: 24px; }
  .stat { text-align: right; }
  .stat-val { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat-lbl { color: var(--dim); font-size: 10px; margin-top: 2px; }

  /* Panels */
  .panel { background: var(--surface); overflow: hidden; display: flex; flex-direction: column; }
  .panel-left  { grid-area: left; }
  .panel-center{ grid-area: center; }
  .panel-right { grid-area: right; }

  .phead {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
    font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 600;
    letter-spacing: 1.5px; color: var(--dim); text-transform: uppercase;
    flex-shrink: 0;
  }

  /* Transcript feed */
  #transcript-feed {
    flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: var(--muted) transparent;
  }
  .entry {
    border-left: 2px solid var(--muted); padding-left: 10px;
    animation: fadeIn .35s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .entry.has-keyword { border-left-color: var(--accent); }
  .entry-meta { color: var(--dim); font-size: 10px; margin-bottom: 3px; }
  .entry-text { color: var(--text); line-height: 1.55; }
  .entry-text mark { background: none; color: var(--accent); font-style: italic; }
  .entry-emo { margin-top: 5px; display: flex; gap: 6px; flex-wrap: wrap; }
  .emo-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 999px;
    border: 1px solid; opacity: .85;
  }
  .silence-note { color: var(--muted); font-style: italic; font-size: 11px; text-align: center; padding: 4px 0; }

  /* Emotion chart */
  .chart-wrap { flex: 1; padding: 16px 18px; min-height: 0; position: relative; }
  canvas#emo-chart { width: 100% !important; }

  /* Emotion history sparklines */
  #emo-history { padding: 0 18px 14px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
  .spark-row { display: flex; align-items: center; gap: 8px; }
  .spark-lbl { width: 58px; color: var(--dim); font-size: 10px; text-transform: capitalize; flex-shrink: 0; }
  .spark-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
  .spark-bar { height: 100%; border-radius: 999px; transition: width .6s ease; }
  .spark-val { width: 34px; text-align: right; font-size: 10px; color: var(--dim); }

  /* Speaker timeline */
  #speaker-timeline {
    flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 8px;
    scrollbar-width: thin; scrollbar-color: var(--muted) transparent;
  }
  .spk-entry { display: flex; align-items: center; gap: 10px; animation: fadeIn .35s ease; }
  .spk-badge {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; flex-shrink: 0;
  }
  .spk-info { flex: 1; min-width: 0; }
  .spk-name { font-size: 11px; color: var(--text); }
  .spk-time { font-size: 10px; color: var(--dim); }

  /* Keywords alert strip */
  #kw-strip {
    padding: 10px 18px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; gap: 6px; flex-wrap: wrap; min-height: 44px; align-items: center;
  }
  .kw-chip {
    font-size: 10px; padding: 3px 10px; border-radius: 999px;
    background: rgba(0,229,160,.1); border: 1px solid rgba(0,229,160,.3);
    color: var(--accent); animation: fadeIn .3s ease;
  }
  #kw-empty { color: var(--muted); font-size: 10px; font-style: italic; }

  /* Scrollbar for webkit */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">speech<span>/</span>analyzer</div>
    <div class="pill" id="status-pill">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">connecting…</span>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-val" id="st-chunks">0</div><div class="stat-lbl">chunks</div></div>
      <div class="stat"><div class="stat-val" id="st-words">0</div><div class="stat-lbl">words</div></div>
      <div class="stat"><div class="stat-val" id="st-kw">0</div><div class="stat-lbl">keywords</div></div>
      <div class="stat"><div class="stat-val" id="st-spk">—</div><div class="stat-lbl">dominant emotion</div></div>
    </div>
  </header>

  <!-- Left: transcript -->
  <div class="panel panel-left">
    <div class="phead">Live transcript</div>
    <div id="transcript-feed">
      <div class="silence-note">Waiting for audio…</div>
    </div>
  </div>

  <!-- Center: emotion chart + history -->
  <div class="panel panel-center">
    <div class="phead">Emotion over time</div>
    <div class="chart-wrap">
      <canvas id="emo-chart"></canvas>
    </div>
    <div class="phead" style="border-top:1px solid var(--border)">Current scores</div>
    <div id="emo-history">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Right: speakers + keywords -->
  <div class="panel panel-right">
    <div class="phead">Speaker timeline</div>
    <div id="speaker-timeline">
      <div class="silence-note" style="margin-top:8px">No speakers yet…</div>
    </div>
    <div class="phead" style="border-top:1px solid var(--border)">Keyword alerts</div>
    <div id="kw-strip"><span id="kw-empty">None detected</span></div>
  </div>

</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const EMO_COLORS = {
  joy:      '#f4c430',
  anger:    '#ff4f4f',
  sadness:  '#5b8fff',
  fear:     '#bf5fff',
  surprise: '#ff914d',
  disgust:  '#4fdb7a',
  neutral:  '#8892a4',
};
const EMOTIONS = Object.keys(EMO_COLORS);
const MAX_POINTS = 40;
const SPK_COLORS = ['#00e5a0','#5b8fff','#f4c430','#ff914d','#bf5fff','#ff4f4f'];

// ── State ─────────────────────────────────────────────────────────────────────
let chunks = 0, words = 0, kwCount = 0;
const emoHistory = {};
EMOTIONS.forEach(e => emoHistory[e] = []);
const speakers = {};
let spkIdx = 0;
const recentKw = [];

// ── Chart.js setup ────────────────────────────────────────────────────────────
const ctx = document.getElementById('emo-chart').getContext('2d');
const labels = [];

const datasets = EMOTIONS.map(e => ({
  label: e,
  data: [],
  borderColor: EMO_COLORS[e],
  backgroundColor: EMO_COLORS[e] + '18',
  borderWidth: 1.5,
  pointRadius: 0,
  tension: 0.45,
  fill: false,
}));

const chart = new Chart(ctx, {
  type: 'line',
  data: { labels, datasets },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 300 },
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        labels: {
          color: '#6b7280', font: { family: 'DM Mono', size: 10 },
          boxWidth: 10, padding: 10,
          filter: item => datasets[item.datasetIndex].data.some(v => v > 0),
        }
      },
      tooltip: {
        backgroundColor: '#111318', borderColor: '#1e2128', borderWidth: 1,
        titleColor: '#e2e5ec', bodyColor: '#6b7280',
        titleFont: { family: 'Syne', size: 12 },
        bodyFont: { family: 'DM Mono', size: 11 },
        callbacks: {
          label: ctx => ` ${ctx.dataset.label}: ${(ctx.raw * 100).toFixed(0)}%`
        }
      }
    },
    scales: {
      x: {
        display: false,
        ticks: { color: '#3a3f4a', maxTicksLimit: 6, font: { family: 'DM Mono', size: 9 } },
        grid: { color: '#1e2128' }
      },
      y: {
        min: 0, max: 1,
        ticks: {
          color: '#3a3f4a', font: { family: 'DM Mono', size: 9 }, stepSize: 0.25,
          callback: v => (v * 100) + '%'
        },
        grid: { color: '#1e2128' }
      }
    }
  }
});

// ── Spark bars ────────────────────────────────────────────────────────────────
function buildSparks() {
  const wrap = document.getElementById('emo-history');
  wrap.innerHTML = '';
  EMOTIONS.forEach(e => {
    const row = document.createElement('div');
    row.className = 'spark-row';
    row.innerHTML = `
      <span class="spark-lbl">${e}</span>
      <div class="spark-bar-bg"><div class="spark-bar" id="sb-${e}" style="width:0%;background:${EMO_COLORS[e]}"></div></div>
      <span class="spark-val" id="sv-${e}">0%</span>`;
    wrap.appendChild(row);
  });
}
buildSparks();

// ── Push new emotions into chart + sparks ─────────────────────────────────────
function pushEmotions(emotions) {
  const ts = new Date().toLocaleTimeString('en', { hour12: false });
  labels.push(ts);
  if (labels.length > MAX_POINTS) labels.shift();

  const scoreMap = {};
  EMOTIONS.forEach(e => scoreMap[e] = 0);
  emotions.forEach(({ label, score }) => { if (scoreMap[label] !== undefined) scoreMap[label] = score; });

  datasets.forEach(ds => {
    ds.data.push(scoreMap[ds.label] ?? 0);
    if (ds.data.length > MAX_POINTS) ds.data.shift();
  });
  chart.update('none');

  // Sparks
  EMOTIONS.forEach(e => {
    const pct = ((scoreMap[e] ?? 0) * 100).toFixed(0);
    const bar = document.getElementById('sb-' + e);
    const val = document.getElementById('sv-' + e);
    if (bar) bar.style.width = pct + '%';
    if (val) val.textContent = pct + '%';
  });

  // Dominant
  const dom = emotions[0];
  if (dom) document.getElementById('st-spk').textContent = dom.label;
}

// ── Transcript entry ──────────────────────────────────────────────────────────
function addTranscript(result) {
  const feed = document.getElementById('transcript-feed');
  // Remove placeholder
  feed.querySelectorAll('.silence-note').forEach(n => n.remove());

  const entry = document.createElement('div');
  entry.className = 'entry' + (result.keywords_found?.length ? ' has-keyword' : '');

  const time = new Date(result.timestamp).toLocaleTimeString('en', { hour12: false });
  let text = result.transcript || '';
  (result.keywords_found || []).forEach(kw => {
    text = text.replace(new RegExp(`\\b${kw}\\b`, 'gi'), m => `<mark>${m}</mark>`);
  });

  const emoBadges = (result.text_emotions || []).slice(0, 3).map(e => {
    const c = EMO_COLORS[e.label] || '#888';
    return `<span class="emo-tag" style="color:${c};border-color:${c}40">${e.label} ${(e.score*100).toFixed(0)}%</span>`;
  }).join('');

  entry.innerHTML = `
    <div class="entry-meta">${time} · ${result.language || 'en'}</div>
    <div class="entry-text">${text}</div>
    ${emoBadges ? `<div class="entry-emo">${emoBadges}</div>` : ''}`;

  feed.appendChild(entry);
  feed.scrollTop = feed.scrollHeight;

  // word count
  words += (result.transcript || '').split(/\s+/).filter(Boolean).length;
  document.getElementById('st-words').textContent = words;
}

// ── Speaker timeline ──────────────────────────────────────────────────────────
function addSpeakers(speakerList) {
  if (!speakerList?.length) return;
  const tl = document.getElementById('speaker-timeline');
  tl.querySelectorAll('.silence-note').forEach(n => n.remove());

  speakerList.forEach(seg => {
    if (!speakers[seg.speaker]) {
      speakers[seg.speaker] = SPK_COLORS[spkIdx++ % SPK_COLORS.length];
    }
    const color = speakers[seg.speaker];
    const entry = document.createElement('div');
    entry.className = 'spk-entry';
    const initial = seg.speaker.replace('SPEAKER_', 'S');
    entry.innerHTML = `
      <div class="spk-badge" style="background:${color}22;color:${color};border:1px solid ${color}44">${initial}</div>
      <div class="spk-info">
        <div class="spk-name">${seg.speaker}</div>
        <div class="spk-time">${seg.start}s → ${seg.end}s</div>
      </div>`;
    tl.appendChild(entry);
    tl.scrollTop = tl.scrollHeight;
  });
}

// ── Keywords ──────────────────────────────────────────────────────────────────
function addKeywords(kws) {
  if (!kws?.length) return;
  const strip = document.getElementById('kw-strip');
  document.getElementById('kw-empty')?.remove();

  kws.forEach(kw => {
    if (recentKw.includes(kw)) return;
    recentKw.push(kw);
    const chip = document.createElement('span');
    chip.className = 'kw-chip';
    chip.textContent = kw;
    strip.appendChild(chip);
    kwCount++;
    document.getElementById('st-kw').textContent = kwCount;
  });
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws, pingInterval;

function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById('status-dot').classList.add('live');
    document.getElementById('status-pill').classList.add('live');
    document.getElementById('status-text').textContent = 'live';
    pingInterval = setInterval(() => ws.readyState === 1 && ws.send('ping'), 15000);
  };

  ws.onclose = () => {
    document.getElementById('status-dot').classList.remove('live');
    document.getElementById('status-pill').classList.remove('live');
    document.getElementById('status-text').textContent = 'reconnecting…';
    clearInterval(pingInterval);
    setTimeout(connect, 2000);
  };

  ws.onerror = () => ws.close();

  ws.onmessage = ({ data }) => {
    let result;
    try { result = JSON.parse(data); } catch { return; }
    if (result.is_silent) return;

    chunks++;
    document.getElementById('st-chunks').textContent = chunks;

    if (result.transcript) addTranscript(result);
    if (result.text_emotions?.length) pushEmotions(result.text_emotions);
    if (result.speakers?.length) addSpeakers(result.speakers);
    if (result.keywords_found?.length) addKeywords(result.keywords_found);
  };
}

connect();
</script>
</body>
</html>
